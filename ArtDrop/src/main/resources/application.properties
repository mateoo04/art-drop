spring.application.name=ArtDrop
spring.config.import=optional:file:.env[.properties]

logging.level.org.springframework.web=DEBUG
server.port=8089

spring.datasource.url=jdbc:h2:file:./data/artdropapp;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

jwt.token-validity-seconds=86400
jwt.base64-secret=${JWT_BASE64_SECRET}

app.seller.reapply-cooldown-days=14