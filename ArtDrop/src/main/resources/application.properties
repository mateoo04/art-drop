# Local: uncomment to enable the dev profile (DevDataRebaser rebases seed timestamps).
#spring.profiles.active=dev

spring.application.name=ArtDrop
spring.config.import=optional:file:.env[.properties]

logging.level.org.springframework.web=DEBUG
server.port=8089

spring.datasource.url=jdbc:h2:file:./data/artdropapp;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

jwt.token-validity-seconds=86400
jwt.base64-secret=${JWT_BASE64_SECRET}

app.seller.reapply-cooldown-days=14

# Home feed ranking weights and parameters
feed.ranking.w-circle=1.5
feed.ranking.w-engage=1.0
feed.ranking.w-recency=2.0
feed.ranking.w-seen=3.0
feed.ranking.recency-half-life-hours=36
feed.ranking.engagement-half-life-hours=96
feed.ranking.seen-recency-half-life-hours=12
feed.ranking.candidate-window-days=30
feed.ranking.circle-window-days=90
feed.ranking.candidate-cap=300
feed.ranking.seen-window-days=7
feed.ranking.snapshot-ttl-minutes=5
feed.ranking.snapshot-max-entries=10000
feed.seen.dedupe-window-minutes=30
feed.seen.retention-days=14
feed.seen.cleanup-cron=0 30 3 * * *

spring.task.scheduling.pool.size=1